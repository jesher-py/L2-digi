{%extends "base.html" %}
{% block content %}
    <h1>Parts</h1>
    {% for part in results %}
        <!-- then the name, brand, price then the image -->
        <h1> {{ part[0] }} </h1>
        <h2>{{ part[1] }} | ${{ part[2] }}</h2>
        <img src="{{ url_for('static', filename=part[3]) }}" alt="{{ part[0]}}">
    {% endfor %}
{% endblock %}
